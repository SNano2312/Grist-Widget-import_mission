
<h2 class="sr-only">Diagnostic approfondi Excel</h2>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); color: var(--color-text-primary); }
.body { padding: 1.25rem 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
.lbl { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: .06em; color: var(--color-text-secondary); margin-bottom: 7px; }
.drop-zone { border: 1.5px dashed var(--color-border-secondary); border-radius: var(--border-radius-lg); padding: 1.5rem; text-align: center; cursor: pointer; background: var(--color-background-secondary); }
.drop-zone:hover { border-color: #378ADD; background: #E6F1FB; }
.mono { border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); background: var(--color-background-secondary); padding: 10px 14px; font-size: 11px; font-family: var(--font-mono); line-height: 2; max-height: 350px; overflow-y: auto; }
.mono b { color: #185FA5; }
.mono .warn { color: #854F0B; font-weight: 600; }
.mono .ok { color: #3B6D11; font-weight: 600; }
.hidden { display: none !important; }
input[type=file] { display: none; }
</style>
<div class="body">
  <div>
    <div class="lbl">Diagnostic bas niveau — chargez votre fichier</div>
    <div class="drop-zone" id="dz">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin:0 auto 7px;display:block;color:var(--color-text-secondary)"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      <p style="font-size:13px;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">Glissez votre fichier ici</strong> ou cliquez</p>
    </div>
    <input type="file" id="fi" accept=".xlsx,.xls">
  </div>
  <div id="out" class="hidden">
    <div class="lbl">Résultat</div>
    <div class="mono" id="log"></div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
(function(){
  const dz = document.getElementById('dz');
  const fi = document.getElementById('fi');
  const out = document.getElementById('out');
  const log = document.getElementById('log');

  dz.addEventListener('click', () => fi.click());
  fi.addEventListener('change', e => load(e.target.files[0]));
  dz.addEventListener('dragover', e => { e.preventDefault(); });
  dz.addEventListener('drop', e => { e.preventDefault(); load(e.dataTransfer.files[0]); });

  function add(html) { log.innerHTML += html + '<br>'; }

  function load(file) {
    log.innerHTML = '';
    out.classList.remove('hidden');
    const reader = new FileReader();
    reader.onload = e => {
      const wb = XLSX.read(e.target.result, { type: 'array', raw: false });

      add('Feuilles : <b>' + wb.SheetNames.join(', ') + '</b>');
      const ws = wb.Sheets[wb.SheetNames[0]];

      const ref = ws['!ref'];
      add('ws[\'!ref\'] = <b>' + ref + '</b>');

      const range = XLSX.utils.decode_range(ref || 'A1');
      add('range.s.r=' + range.s.r + '  range.s.c=' + range.s.c);
      add('range.e.r=' + range.e.r + '  range.e.c=' + range.e.c);
      add('→ Nombre total de lignes dans la plage : <b>' + (range.e.r - range.s.r + 1) + '</b>');
      add('─────────────────────────────');

      // Tester quelques cellules clés
      const testCells = ['A1','Y1','A2','Y2','A3','Y3','A4','Y4','A5','Y5'];
      testCells.forEach(addr => {
        const cell = ws[addr];
        if (cell) {
          add(addr + ' → <b>"' + cell.v + '"</b>  (type=' + cell.t + ')');
        } else {
          add(addr + ' → <span class="warn">(cellule absente)</span>');
        }
      });

      add('─────────────────────────────');

      // Compter les cellules présentes
      const allKeys = Object.keys(ws).filter(k => !k.startsWith('!'));
      add('Total de cellules non vides dans la feuille : <b>' + allKeys.length + '</b>');

      // Quelle est la première cellule avec une valeur en colonne Y ?
      const yCells = allKeys.filter(k => k.startsWith('Y')).sort();
      add('Cellules colonne Y présentes : <b>' + yCells.slice(0,10).join(', ') + (yCells.length > 10 ? '…' : '') + '</b>');

      // Tester sheet_to_json avec header:1
      const arrRaw = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
      add('sheet_to_json(header:1) → <b>' + arrRaw.length + ' lignes</b>');
      if (arrRaw.length > 0) {
        add('Ligne 0 (longueur ' + arrRaw[0].length + ') : <b>' + JSON.stringify(arrRaw[0].slice(0,5)) + '…</b>');
      }
      if (arrRaw.length > 1) {
        add('Ligne 1 : <b>' + JSON.stringify(arrRaw[1].slice(0,5)) + '…</b>');
      }
      if (arrRaw.length > 3) {
        add('Ligne 3 : <b>' + JSON.stringify(arrRaw[3].slice(24, 26)) + '</b> (colonnes X-Y)');
      }

      add('─────────────────────────────');
      add('<span class="ok">Copiez tout ce texte et partagez-le.</span>');
    };
    reader.readAsArrayBuffer(file);
  }
})();
</script>
